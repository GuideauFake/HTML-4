<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grouping tags</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
            background-color: gray;
        }
        header{
            background-color: white;
            padding: 10px;
            margin: 10px;
        }
        main{
           padding: 10px;
            margin: 10px;
           background-color: white;
        }
        nav{
            background-color: rgba(0, 0, 0, 0.733);
            color: white;
            padding: 2px;
            box-shadow: 2px 2px 5px 0px black;

        }
        nav a{
            color: white;
            text-decoration: none;
            margin: 20px;
        }
        footer{
            background-color: rgba(0, 0, 0, 0.733);
            text-align: center;
            margin: 10px;
            color: white;
        }
        .noticia{
            background-color: rgba(0, 0, 0, 0.733);
            color: white;
            padding: 10px;
            margin: 10px;   
        }
        .fotibal{
            background-color: rgba(0, 0, 0, 0.733);
            color: white;
            padding: 10px;
            margin: 10px;   
        }
        aside{
            background-color: rgb(255, 242, 242);
            color: rgb(0, 0, 0);
            padding: 10px;
            margin: 10px;   
        }
        section{
            padding: 0px 10px 10px 10px;
            margin: 2px;
        }
    </style>
</head>
<body>
 <header>
    <h1>meu site</h1>
    <nav>
        <a href="#">home</a>
        <a href="#">sobre</a>
        <a href="#">contato</a>
        <a href="#">meus zovo</a>
    </nav>
 </header>
 <main>
    <section class="fotibal">
        <aside>
                <h2>titulo do aside</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
        </aside>
    </section>
    <section class="noticia">
        <h1>noticias</h1>
        <aside>
                <h2>titulo do aside</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, voluptate.</p>
        </aside>
    </section>
 </main>
 <footer>
    <p>meu rodape</p>
 </footer>
</body>
</html>
